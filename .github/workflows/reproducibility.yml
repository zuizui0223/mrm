name: MRM reproducibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-replay:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and tests
        run: python -m pip install -e '.[dev]'
      - name: Run MRM theorem tests
        run: pytest
      - name: Write deterministic replay report
        if: matrix.python-version == '3.12'
        run: python scripts/verify_mrm_core.py
      - name: Upload replay artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: mrm-core-reproducibility
          path: artifacts/mrm_core_report.json
